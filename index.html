<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love 💖</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-y:auto; /* يسمح بالتمرير عمودي */
  text-align:center;
  height:auto;
}

/* الخلفية */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* login */
#login{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#000;
  overflow:hidden;
}

input,button{
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* المحتوى */
#content{
  display:none;
  padding:10px;
}

/* العداد الرقمي */
.counter-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
  flex-wrap:wrap;
}

.time{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  min-width:70px;
  box-shadow:0 0 10px pink;
}

.time h2{
  margin:0;
  font-size:25px;
}

.time span{
  font-size:12px;
  color:#ccc;
}

/* slider */
.slider{
  position:relative;
  width:100%;
  height:100vh; /* يغطي كامل ارتفاع الشاشة */
  overflow:hidden;
}

.slider img{
  width:100%;
  height:100%;
  object-fit:cover; /* تغطي الصورة كل المساحة */
  display:none;
}
.slider img:first-child{
  display:block;
}

/* chat */
.chat{
  background:rgba(255,255,255,0.1);
  margin:5px;
  padding:10px;
  border-radius:10px;
  text-align:left;
}

/* surprise */
#surprise{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:35px;
  background:black;
  animation:glow 1s infinite alternate;
}
@keyframes glow{
  from{color:white;}
  to{color:pink;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="login">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="pass">
  <button onclick="check()">Enter</button>
  <p id="error"></p>
</div>

<div id="content">

<h1>نور عيني❤️</h1>

<!-- صور -->
<div class="slider">
  <img src="assets/IMG20260327144104.jpg" class="active">
  <img src="assets/IMG-20260328-WA0064.jpg">
  <img src="assets/1758691834031.jpg">
</div>

<!-- العداد الرقمي -->
<div class="counter-box">
  <div class="time"><h2 id="days">0</h2><span>يوم</span></div>
  <div class="time"><h2 id="hours">0</h2><span>ساعة</span></div>
  <div class="time"><h2 id="minutes">0</h2><span>دقيقة</span></div>
  <div class="time"><h2 id="seconds">0</h2><span>ثانية</span></div>
</div>

<!-- شات -->
<div id="chatBox"></div>

<br>
<button onclick="toggleMusic()">🎵</button>
<button onclick="showSurprise()">🎁</button>

</div>

<div id="surprise" onclick="this.style.display='none'">
أحبكِ أضعاف ذلك الحب الذي تتخيلينه، أنتِ رفيقة روحي وأعظم كنز في حياتي
</div>

<audio id="music" loop>
<source src="assets/ssstik.io_1775220985701.mp3">
</audio>

<script>

/* login */
function check(){
  if(pass.value==="love"){
    login.style.display="none";
    content.style.display="block";
    music.play();
    startAll();
  }else{
    error.innerText="غلط!";
  }
}

/* start */
function startAll(){
  startSlider();
  startCounter();
  startChat();
  startParticles();
}

/* slider */
function startSlider(){
  let imgs=document.querySelectorAll(".slider img");
  let i=0;
  setInterval(()=>{
    imgs[i].style.display="none"; // إخفاء الصورة الحالية
    i=(i+1)%imgs.length;
    imgs[i].style.display="block"; // إظهار الصورة التالية
  },3000);
}

/* العداد الرقمي */
function startCounter(){
  let startDate=new Date("2025-05-04");

  setInterval(()=>{
    let now=new Date();
    let diff=now-startDate;

    let d=Math.floor(diff/(1000*60*60*24));
    let h=Math.floor(diff/(1000*60*60)%24);
    let m=Math.floor(diff/(1000*60)%60);
    let s=Math.floor(diff/1000%60);

    document.getElementById("days").innerText=d;
    document.getElementById("hours").innerText=h;
    document.getElementById("minutes").innerText=m;
    document.getElementById("seconds").innerText=s;

  },1000);
}

/* chat */
function startChat(){
  let msgs=["بحبك ❤️","مش هلاقي زيك ❤️","وحشتيني❤️","بموت فيكي ❤️"];
  let i=0;

  let interval=setInterval(()=>{
    if(i<msgs.length){
      let div=document.createElement("div");
      div.className="chat";
      div.innerText=msgs[i];
      chatBox.appendChild(div);
      i++;
    }else clearInterval(interval);
  },2000);
}

/* background */
function startParticles(){
  let c=document.getElementById("bg");
  let ctx=c.getContext("2d");
  c.width=innerWidth;
  c.height=innerHeight;

  let arr=[];
  for(let i=0;i<100;i++){
    arr.push({x:Math.random()*c.width,y:Math.random()*c.height});
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    arr.forEach(p=>{
      ctx.fillStyle="pink";
      ctx.fillRect(p.x,p.y,2,2);
      p.y-=1;
      if(p.y<0) p.y=c.height;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

/* music */
function toggleMusic(){
  music.paused?music.play():music.pause();
}

/* surprise */
function showSurprise(){
  surprise.style.display="flex";
}

</script>

</body>
</html>
